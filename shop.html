<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NUX SHOP</title>
<style>
:root { --gold:#ffd700; --dark:#0a0a0a; --card:#161616; --accent:#00ff41; --text:#fff; }
body { background:#000; color:#fff; font-family:'Segoe UI', Tahoma, sans-serif; margin:0; padding:20px; text-align:center; }
h2 { color: var(--gold); margin-bottom:20px; }
#items { display:flex; flex-wrap:wrap; justify-content:center; }
.item { background:var(--card); border:1px solid #333; border-radius:15px; padding:15px; margin:10px; width:180px; transition:0.3s; cursor:pointer; position:relative; overflow:hidden; }
.item:hover { transform:translateY(-5px); box-shadow:0 10px 20px rgba(255,215,0,0.3); }
.item h3 { font-size:16px; margin-bottom:5px; }
.item p { font-size:14px; margin:3px 0; }
button { padding:8px 12px; border:none; border-radius:10px; background:var(--gold); color:#000; font-weight:bold; cursor:pointer; transition:0.3s; }
button:hover { transform:translateY(-2px); box-shadow:0 5px 15px rgba(255,215,0,0.4); }
@keyframes coin-drop { 0% { transform:translateY(-20px); opacity:0; } 50% { opacity:1; } 100% { transform:translateY(0px); opacity:1; } }
.coin-effect { position:absolute; top:-20px; right:10px; font-size:20px; color:var(--gold); animation: coin-drop 0.5s ease forwards; }
</style>
</head>
<body>

<h2>🛒 חנות NUX</h2>
<div id="items"></div>

<script>
const API = "https://nuxcoin-e0d41-default-rtdb.firebaseio.com/";
let userBalance = parseInt(localStorage.getItem('nux_user_balance')) || 0;

// --- קנייה ---
function buy(item){
    if(userBalance < item.price) return alert("אין לך מספיק NUX");
    userBalance -= item.price;
    localStorage.setItem('nux_user_balance', userBalance);

    // אפקט מטבע
    const coin = document.createElement('div');
    coin.className='coin-effect';
    coin.innerText='💰';
    document.body.appendChild(coin);
    setTimeout(()=>coin.remove(),600);

    alert(`קנית את ${item.name} ב-${item.price} NUX!\nיתרה: ${userBalance}`);
    
    // שליחת הקנייה חזרה ל-index
    if(window.opener){
        window.opener.postMessage({type:'BUY', item:item}, '*');
    }
}

// --- טעינת פריטים ---
async function render(){
    const itemsDiv = document.getElementById('items');
    itemsDiv.innerHTML="טוען...";
    try{
        const res = await fetch(`${API}shopItems.json`);
        const data = await res.json() || {};
        itemsDiv.innerHTML="";
        for(let id in data){
            const item = data[id];
            const div = document.createElement('div');
            div.className='item';
            div.innerHTML=`
                <h3>${item.name}</h3>
                <p>💰 מחיר: ${item.price}</p>
                <p>🔹 סוג: ${item.type}</p>
                <button onclick='buy(${JSON.stringify(item)})'>קנה</button>
            `;
            itemsDiv.appendChild(div);
        }
        if(Object.keys(data).length===0) itemsDiv.innerHTML="אין פריטים כרגע";
    }catch(e){
        itemsDiv.innerHTML="שגיאה בטעינת פריטים";
    }
}

// INIT
render();

// אפשר להוסיף חידוש אנימציות נוספים בעתיד
</script>

</body>
</html>
