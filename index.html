<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>NUX SYSTEM</title>

<style>
body { background:#0a0a0a; color:#fff; font-family:Arial; text-align:center; }
.box { background:#161616; padding:20px; border-radius:15px; width:360px; margin:auto; }
button { padding:10px; margin:5px; border-radius:10px; border:none; background:gold; cursor:pointer; }
.hidden{display:none;}
</style>

</head>
<body>

<div id="login" class="box">
<h2>NUX LOGIN</h2>
<input id="user" placeholder="שם משתמש"><br>
<input id="pass" type="password" placeholder="סיסמה"><br>

<button onclick="login()">כניסה</button>
<button onclick="register()">הרשמה</button>
</div>

<div id="app" class="box hidden">

<h3 id="profile"></h3>
<div id="balance"></div>

<button onclick="work()">💼 עבודה</button>
<button onclick="openShop()">🛒 חנות</button>

</div>

<script>

let db = JSON.parse(localStorage.getItem("NUX_DB")) || {};
let currentUser = null;

// ===== AUTH =====
function register(){
let u=user.value, p=pass.value;
if(!db[u]){
db[u]={pass:p,balance:1000};
save();
alert("נרשמת");
}
}

function login(){
let u=user.value, p=pass.value;
if(db[u] && db[u].pass===p){
currentUser=u;
login.classList.add("hidden");
app.classList.remove("hidden");
render();
}else alert("שגוי");
}

// ===== USER =====
function me(){ return db[currentUser]; }

// ===== GAME =====
function work(){ me().balance+=100; render(); }

// ===== SHOP OPEN =====
function openShop(){

// שליחת נתונים לחנות
localStorage.setItem("NUX_CURRENT_USER", currentUser);

// פתיחת חלון חנות
window.open("shop.html", "_blank");

// מאזין לחזרה מהחנות
window.addEventListener("message", (event)=>{
if(event.data.type==="BUY"){

let item = event.data.item;
let u = me();

if(u.balance >= item.price){
u.balance -= item.price;

if(item.type==="money") u.balance += item.value;
if(item.type==="boost") alert("שדרוג נקנה");

save();
render();
}else{
alert("אין מספיק כסף");
}
}
});
}

// ===== RENDER =====
function render(){
profile.innerText = currentUser;
balance.innerText = "💰 " + me().balance;
}

// ===== SAVE =====
function save(){
localStorage.setItem("NUX_DB", JSON.stringify(db));
}

</script>
</body>
</html>
