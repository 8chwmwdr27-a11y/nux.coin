<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NUX Terminal Pro</title>
<style>
:root { --gold: #ffd700; --dark: #0a0a0a; --card: #161616; --text: #f0f0f0; --accent: #00ff41; }
body { background-color: var(--dark); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; margin:0; padding:0; overflow-x:hidden; display:flex; justify-content:center; align-items:center; min-height:100vh; }
.container { background: var(--card); padding:30px; border-radius:20px; width:400px; max-width:90%; text-align:center; position:relative; box-shadow:0 20px 50px rgba(0,0,0,0.7); }
.container::after { content:''; position:absolute; top:-2px; left:-2px; right:-2px; bottom:-2px; border-radius:22px; background:linear-gradient(45deg, transparent, var(--gold), transparent); z-index:-1; opacity:0.3; }

h2 { color: var(--gold); margin-bottom:10px; }

input { width:90%; padding:12px; margin:10px 0; border-radius:10px; border:1px solid #333; background:#000; color:#fff; text-align:center; outline:none; }
button { width:90%; padding:12px; margin-top:15px; border:none; border-radius:12px; background: var(--gold); color:#000; font-weight:bold; cursor:pointer; transition:0.3s; }
button:hover { transform:translateY(-2px); box-shadow:0 5px 15px rgba(255,215,0,0.5); }

.hidden { display:none !important; }

.balance-box { background:#000; padding:20px; border-radius:15px; margin:20px 0; border:1px solid #222; position:relative; overflow:hidden; }
.balance { font-size:45px; font-weight:900; color: var(--gold); text-shadow:0 0 20px rgba(255,215,0,0.5); }
.coin { position:absolute; width:20px; height:20px; border-radius:50%; background: var(--gold); animation: coinDrop 1s linear forwards; }
@keyframes coinDrop { 0% { transform:translateY(0); opacity:1; } 100% { transform:translateY(80px) rotate(360deg); opacity:0; } }

.alert-bar { background: var(--gold); color:#000; padding:8px; font-size:13px; font-weight:bold; border-radius:8px; margin-bottom:15px; animation: pulse 2s infinite; }
@keyframes pulse { 0% { opacity:0.8; } 50% { opacity:1; } 100% { opacity:0.8; } }

.task-list { background:#0e0e0e; padding:15px; border-radius:15px; text-align:right; margin-top:25px; border:1px solid #333; }
.task-item { border-bottom:1px solid #222; padding:12px 5px; font-size:14px; display:flex; justify-content:space-between; }
.status-pill { background: var(--accent); color:#000; font-size:10px; padding:2px 8px; border-radius:10px; font-weight:bold; }

.nav-bar { display:flex; justify-content:space-around; margin-top:15px; }
.nav-bar button { width:30%; }
</style>
</head>
<body>

<!-- מסך התחברות -->
<div id="auth-screen" class="container">
<h2>NUX Terminal</h2>
<p style="font-size:13px; color:#888;">התחבר למערכת</p>
<input type="text" id="username" placeholder="שם משתמש">
<input type="password" id="password" placeholder="סיסמה">
<button onclick="auth()">כניסה מאובטחת</button>
</div>

<!-- מסך ראשי -->
<div id="main-screen" class="container hidden">

<div id="admin-alert" class="alert-bar hidden">הודעה מההנהלה: <span id="alert-text"></span></div>
<div style="font-size:14px; color:#aaa;" id="user-tag"></div>

<div class="balance-box">
<div style="font-size:12px; color:#666; margin-bottom:5px;">יתרת NUX נוכחית</div>
<div class="balance" id="balance">0</div>
</div>

<div class="nav-bar">
<button onclick="showSection('jobs')">💼 עבודות</button>
<button onclick="showSection('shop')">🛒 חנות</button>
<button onclick="showSection('profile')">👤 אזור אישי</button>
</div>

<!-- JOBS -->
<div id="jobs" class="hidden">
<h4>בחר נתיב הכנסה:</h4>
<button onclick="startJob('סוכן',120)">🕵️ סוכן (120/דק')</button>
<button onclick="startJob('מוציא לפועל',100)">⚖️ מוציא לפועל (100/דק')</button>

<div id="active-work" class="hidden">
<span class="status-pill">פעיל בתפקיד <span id="job-title"></span></span>
<div class="task-list">
<strong style="font-size:13px; color: var(--gold)">📋 משימות מבצעיות:</strong>
<div id="tasks-container" style="margin-top:10px; color:#ccc; font-size:13px;">מחפש פקודות...</div>
</div>
<button onclick="resign()" style="background:#441111; color:#ff4444; margin-top:20px; font-size:12px;">סיום תפקיד</button>
</div>
</div>

<!-- SHOP -->
<div id="shop" class="hidden">
<button onclick="openShop()">פתח חנות</button>
</div>

<!-- PROFILE -->
<div id="profile" class="hidden">
<h3>👤 אזור אישי</h3>
<p id="profile-info">טוען...</p>
</div>

</div>

<script>
// 🔥 Firebase
const API = "https://nuxcoin-e0d41-default-rtdb.firebaseio.com/";

// 💾 DB מקומי
let user = null;
let db = JSON.parse(localStorage.getItem('nux_pro_db')) || {};

// --- התחברות ---
function auth(){
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value;
    if(!u || !p) return alert("הזן שם משתמש וסיסמה");
    if(!db[u]) db[u] = { pass:p, balance:0, job:null };
    if(db[u].pass!==p) return alert("סיסמה שגויה");
    user = u;
    showMain();
}

// --- הצגת המסך הראשי ---
function showMain(){
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('main-screen').classList.remove('hidden');
    document.getElementById('user-tag').innerText = `מזהה עובד: ${user}`;
    updateUI();
    setInterval(syncWithAdmin,2000);
}

// --- בחירת מסך ---
function showSection(id){
    ['jobs','shop','profile'].forEach(s=>document.getElementById(s).classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
}

// --- עבודה ---
function startJob(name,pay){
    db[user].job={name,pay};
    save();
    updateUI();
}

// --- UI update ---
function updateUI(){
    const data = db[user];
    document.getElementById('balance').innerText=Math.floor(data.balance).toLocaleString();
    if(data.job){
        document.getElementById('jobs').querySelector('#active-work').classList.remove('hidden');
        document.getElementById('job-title').innerText=data.job.name;
    } else {
        document.getElementById('jobs').querySelector('#active-work').classList.add('hidden');
    }
    document.getElementById('profile-info').innerText=`שם משתמש: ${user}\nיתרה: ${Math.floor(data.balance)} NUX`;
}

// --- מטבעות נופלים ---
setInterval(()=>{
    if(!user) return;
    const el = document.createElement('div');
    el.className='coin';
    el.style.left=Math.random()*360+'px';
    document.querySelector('.balance-box').appendChild(el);
    setTimeout(()=>el.remove(),1200);
},1500);

// --- הכנסת כסף לעבודה ---
setInterval(()=>{
    if(user && db[user].job){
        db[user].balance+=(db[user].job.pay/60);
        save();
        updateUI();
    }
},1000);

// --- שמירה ---
function save(){ localStorage.setItem('nux_pro_db',JSON.stringify(db)); }

// --- סיום עבודה ---
function resign(){ db[user].job=null; save(); updateUI(); }

// --- חנות ---
function openShop(){ window.open('shop.html','_blank','width=600,height=700'); }

// --- סינכרון עם Admin/Firebase ---
async function syncWithAdmin(){
    try{
        const res = await fetch(`${API}.json`);
        const data = await res.json();
        if(data.tasks){
            let html='';
            for(let id in data.tasks) html+=`<div class="task-item">${data.tasks[id].text}</div>`;
            document.getElementById('tasks-container').innerHTML=html;
        }
        if(data.alert && data.alert.text){
            document.getElementById('admin-alert').classList.remove('hidden');
            document.getElementById('alert-text').innerText=data.alert.text;
        } else document.getElementById('admin-alert').classList.add('hidden');

        if(data.bonuses && data.bonuses[user]){
            db[user].balance+=data.bonuses[user];
            save();
            await fetch(`${API}bonuses/${user}.json`,{method:'DELETE'});
        }
    }catch(e){}
}
</script>

</body>
</html>
