<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NUX Terminal Ultimate</title>
<style>
:root { --gold:#ffd700; --dark:#0a0a0a; --card:#161616; --accent:#00ff41; --text:#fff; }
body { background:var(--dark); color:var(--text); font-family:'Segoe UI', Tahoma, sans-serif; margin:0; padding:0; display:flex; justify-content:center; align-items:flex-start; min-height:100vh; }
.container { background:var(--card); border-radius:20px; padding:25px; margin:20px; width:420px; box-shadow:0 10px 30px rgba(0,0,0,0.8); position:relative; }
h2 { color:var(--gold); text-align:center; }
input { width:90%; padding:12px; margin:8px 0; border-radius:10px; border:1px solid #333; background:#000; color:#fff; text-align:center; outline:none; }
button { width:90%; padding:12px; margin:10px 0; border:none; border-radius:12px; background:var(--gold); color:#000; font-weight:bold; cursor:pointer; transition:0.3s; }
button:hover { transform:translateY(-2px); box-shadow:0 5px 15px rgba(255,215,0,0.4); }
.balance-box { background:#000; padding:15px; border-radius:12px; margin:15px 0; text-align:center; border:1px solid #222; }
.balance { font-size:36px; font-weight:900; color:var(--gold); text-shadow:0 0 15px rgba(255,215,0,0.5); }
.status { font-size:14px; color:#aaa; margin-bottom:5px; }
.hidden { display:none !important; }
.section-box { background:#111; border-radius:12px; padding:10px; margin:10px 0; border:1px solid #333; }
.coin-effect { position:absolute; top:-20px; right:10px; font-size:20px; color:var(--gold); animation:coin-drop 0.5s ease forwards; }
@keyframes coin-drop { 0% { transform:translateY(-20px); opacity:0; } 50% { opacity:1; } 100% { transform:translateY(0px); opacity:1; } }
</style>
</head>
<body>

<div id="auth-screen" class="container">
<h2>NUX Terminal – התחברות</h2>
<input type="text" id="username" placeholder="שם משתמש">
<input type="password" id="password" placeholder="סיסמה">
<button onclick="auth()">כניסה</button>
<button onclick="adminLogin()" style="background:#ff4444;">כניסת מנהל 🔐</button>
</div>

<div id="main-screen" class="container hidden">
<h2>ברוך הבא, <span id="user-tag"></span></h2>

<div class="balance-box">
<div class="status">יתרת NUX נוכחית</div>
<div class="balance" id="balance">0</div>
</div>

<button onclick="openShop()">🛒 חנות</button>

<div id="job-section" class="section-box">
<h3>💼 עבודה</h3>
<p>בחר עבודה:</p>
<button onclick="startJob('סוכן', 120)">🕵️ סוכן</button>
<button onclick="startJob('מוציא לפועל', 100)">⚖️ מוציא לפועל</button>
<div id="active-job" class="hidden">
<p>פעיל בתפקיד: <span id="job-name"></span></p>
</div>
</div>

<div id="pet-section" class="section-box hidden">
<h3>🐶 חיית מחמד</h3>
<div>שם: <span id="pet-name"></span></div>
<div>רעב: <span id="pet-hunger"></span>%</div>
<div>צמא: <span id="pet-thirst"></span>%</div>
<div>גיל: <span id="pet-age"></span></div>
<button onclick="feedPet()">האכיל</button>
<button onclick="waterPet()">השקה</button>
</div>

<div id="bot-section" class="section-box hidden">
<h3>🤖 בוטים פעילים</h3>
<div id="bot-list"></div>
</div>

<button onclick="logout()" style="background:#441111; color:#ff4444;">התנתק</button>
</div>

<script>
const API="https://nuxcoin-e0d41-default-rtdb.firebaseio.com/";

let db=JSON.parse(localStorage.getItem('nux_db'))||{};
let user=null;
let jobInterval=null;

function auth(){
    const u=document.getElementById('username').value.trim();
    const p=document.getElementById('password').value.trim();
    if(!u||!p) return alert("יש למלא את כל השדות");
    if(!db[u]) db[u]={pass:p,balance:0,pet:null,bots:[],boost:1};
    if(db[u].pass!==p) return alert("סיסמה שגויה");
    user=u;
    showMain();
}

function adminLogin(){
    const p=document.getElementById('password').value.trim();
    if(p==="2004"){ window.location.href="admin.html"; }
    else alert("סיסמה שגויה למנהל");
}

function showMain(){
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('main-screen').classList.remove('hidden');
    document.getElementById('user-tag').innerText=user;
    updateUI();
    setInterval(runBots,1000);
}

function updateUI(){
    const udata=db[user];
    document.getElementById('balance').innerText=Math.floor(udata.balance);
    // עבודה
    if(udata.job){
        document.getElementById('active-job').classList.remove('hidden');
        document.getElementById('job-name').innerText=udata.job.name;
    } else document.getElementById('active-job').classList.add('hidden');
    // חיות
    if(udata.pet){
        document.getElementById('pet-section').classList.remove('hidden');
        document.getElementById('pet-name').innerText=udata.pet.name;
        document.getElementById('pet-hunger').innerText=udata.pet.hunger;
        document.getElementById('pet-thirst').innerText=udata.pet.thirst;
        document.getElementById('pet-age').innerText=udata.pet.age;
    } else document.getElementById('pet-section').classList.add('hidden');
    // בוטים
    if(udata.bots.length>0){
        document.getElementById('bot-section').classList.remove('hidden');
        const botList=document.getElementById('bot-list');
        botList.innerHTML="";
        udata.bots.forEach(b=>botList.innerHTML+=`<div>${b.name} – rate:${b.rate}/sec</div>`);
    } else document.getElementById('bot-section').classList.add('hidden');
}

// חנות
function openShop(){ window.open("shop.html","_blank","width=400,height=600"); }

// עבודה
function startJob(name,pay){
    db[user].job={name,pay};
    if(jobInterval) clearInterval(jobInterval);
    jobInterval=setInterval(()=>{ db[user].balance += pay*db[user].boost/60; save(); updateUI(); coinEffect(); },1000);
    save();
    updateUI();
}

// חיות
function feedPet(){
    if(user && db[user].pet){
        db[user].pet.hunger=Math.min(100,db[user].pet.hunger+20);
        db[user].balance+=10;
        save(); updateUI(); coinEffect();
    }
}
function waterPet(){
    if(user && db[user].pet){
        db[user].pet.thirst=Math.min(100,db[user].pet.thirst+20);
        db[user].balance+=10;
        save(); updateUI(); coinEffect();
    }
}

// בוטים
function runBots(){
    if(!user) return;
    const udata=db[user];
    if(udata.bots.length>0){
        udata.bots.forEach(bot=>{ udata.balance += bot.rate; });
        save();
        updateUI();
    }
}

// מטבעות
function coinEffect(){
    const coin=document.createElement('div');
    coin.className='coin-effect';
    coin.innerText='💰';
    document.body.appendChild(coin);
    setTimeout(()=>coin.remove(),600);
}

// קנייה מהחנות
window.addEventListener('message', e=>{
    if(e.data.type==='BUY' && user){
        const item=e.data.item;
        if(item.type==='money') db[user].balance+=item.value;
        if(item.type==='boost') db[user].boost=item.value;
        if(item.type==='pet') db[user].pet=item.value;
        if(item.type==='bot') db[user].bots.push(item.value);
        save(); updateUI(); coinEffect();
    }
});

function save(){ localStorage.setItem('nux_db',JSON.stringify(db)); }
function logout(){ user=null; document.getElementById('auth-screen').classList.remove('hidden'); document.getElementById('main-screen').classList.add('hidden'); if(jobInterval) clearInterval(jobInterval); }
</script>

</body>
</html>
