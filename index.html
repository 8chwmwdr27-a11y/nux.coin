<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>NUX ULTIMATE SYSTEM</title>
<style>
body { background:#0a0a0a; color:#fff; font-family:Arial; text-align:center; }
.container { background:#161616; padding:20px; border-radius:20px; width:360px; margin:auto; }
button { padding:10px; margin:5px; border:none; border-radius:10px; cursor:pointer; background:gold; }
.hidden{display:none;}
.tab{margin-top:15px;}
.pet,.bot{border:1px solid #333; padding:5px; margin:5px; border-radius:10px;}
</style>
</head>

<body>

<div id="login" class="container">
<h2>NUX LOGIN</h2>
<input id="user" placeholder="שם משתמש"><br>
<input id="pass" type="password" placeholder="סיסמה"><br>
<button onclick="login()">כניסה</button>
</div>

<div id="app" class="container hidden">

<div id="alert"></div>
<h3 id="profile"></h3>

<div>
<button onclick="tab('home')">🏠</button>
<button onclick="tab('profileTab')">👤</button>
<button onclick="tab('shop')">🛒</button>
<button onclick="tab('bank')">🏦</button>
<button onclick="tab('pets')">🐾</button>
<button onclick="tab('bots')">🤖</button>
</div>

<div id="home" class="tab"></div>
<div id="profileTab" class="tab hidden"></div>
<div id="shop" class="tab hidden"></div>
<div id="bank" class="tab hidden"></div>
<div id="pets" class="tab hidden"></div>
<div id="bots" class="tab hidden"></div>

</div>

<script>

// 🔥 FIREBASE שלך
const API = "https://nuxcoin-e0d41-default-rtdb.firebaseio.com/";

// DB
let db = JSON.parse(localStorage.getItem("NUX_DB")) || {};
let user = null;

// LOGIN
function login(){
let u=userInput(), p=passInput();
if(!db[u]) db[u]={pass:p,balance:1000,xp:0,level:1,job:null,bank:0,pets:[],bots:[],up:{salary:1,speed:1}};
if(db[u].pass!==p) return alert("שגוי");
user=u;
loginDiv().classList.add("hidden");
appDiv().classList.remove("hidden");
init();
}

// HELPERS
const userInput=()=>document.getElementById("user").value;
const passInput=()=>document.getElementById("pass").value;
const loginDiv=()=>document.getElementById("login");
const appDiv=()=>document.getElementById("app");
const me=()=>db[user];

// INIT
function init(){
renderAll();
setInterval(loop,1000);
setInterval(sync,3000);
}

// TABS
function tab(id){
document.querySelectorAll(".tab").forEach(t=>t.classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}

// PROFILE
function renderProfile(){
let u=me();
profile.innerHTML=`${user} | LVL ${u.level} | 💰 ${Math.floor(u.balance)}`;
}

// HOME
function renderHome(){
let u=me();
home.innerHTML=`
<h3>🏠 בית</h3>
💰 ${Math.floor(u.balance)}<br>
🏦 בבנק: ${Math.floor(u.bank)}<br>
🤖 בוטים: ${u.bots.length}<br>
🐾 חיות: ${u.pets.length}<br>

<button onclick="startJob()">💼 עבודה</button>
`;
}

// JOB
function startJob(){
me().job={pay:100};
}

// LOOP
function loop(){
if(!user) return;
let u=me();

if(u.job){
u.balance += (u.job.pay/60)*u.up.salary*u.up.speed;
}

u.bots.forEach(b=>u.balance+=b);

u.xp++;
if(u.xp>=100){u.level++;u.xp=0;}

save();
renderProfile();
}

// SHOP
function renderShop(){
shop.innerHTML=`
<h3>🛒 חנות</h3>
async function renderShop(){
let res = await fetch(API+"shopItems.json");
let data = await res.json();

shop.innerHTML="<h3>🛒 חנות</h3>";

<button onclick="buySalary()">שדרוג שכר (500)</button>
<button onclick="buySpeed()">שדרוג מהירות (400)</button>
<button onclick="buyBot()">קנה בוט (800)</button>
<button onclick="buyPet()">קנה חיה (600)</button>
for(let id in data){
let i=data[id];

shop.innerHTML+=`
<div>
${i.name} - ${i.price}
<button onclick="buyItem('${id}')">קנה</button>
</div>
`;
}
}

async function buyItem(id){
let res=await fetch(API+"shopItems/"+id+".json");
let item=await res.json();

let u=me();

if(u.balance>=item.price){
u.balance-=item.price;

if(item.type==="salary") u.up.salary*=item.value;
if(item.type==="speed") u.up.speed*=item.value;
if(item.type==="bot") u.bots.push(item.value);
if(item.type==="pet") u.pets.push({lvl:1});
if(item.type==="cosmetic") alert("קנית פריט קוסמטי");

save();
renderAll();
}
}
`;
}

function buySalary(){buy(500,()=>me().up.salary*=1.5);}
function buySpeed(){buy(400,()=>me().up.speed*=1.3);}
function buyBot(){buy(800,()=>me().bots.push(5));}
function buyPet(){buy(600,()=>me().pets.push({lvl:1}))}

function buy(cost,fn){
let u=me();
if(u.balance>=cost){u.balance-=cost;fn();save();renderAll();}
}

// BANK
function renderBank(){
let u=me();
bank.innerHTML=`
<h3>🏦 בנק</h3>
💰 מזומן: ${Math.floor(u.balance)}<br>
🏦 בנק: ${Math.floor(u.bank)}<br>

<button onclick="deposit()">הפקד 100</button>
<button onclick="withdraw()">משוך 100</button>
`;
}
function deposit(){if(me().balance>=100){me().balance-=100;me().bank+=100;}}
function withdraw(){if(me().bank>=100){me().bank-=100;me().balance+=100;}}

// PETS
function renderPets(){
let u=me();
pets.innerHTML="<h3>🐾 חיות</h3>";
u.pets.forEach((p,i)=>{
pets.innerHTML+=`<div class='pet'>חיה LVL ${p.lvl} <button onclick="feed(${i})">האכל</button></div>`;
});
}
function feed(i){me().pets[i].lvl++;}

// BOTS
function renderBots(){
let u=me();
bots.innerHTML="<h3>🤖 בוטים</h3>";
u.bots.forEach((b,i)=>{
bots.innerHTML+=`<div class='bot'>בוט +${b}/שנייה</div>`;
});
}

// ADMIN SYNC
async function sync(){
try{
let res=await fetch(API+".json");
let data=await res.json();

if(data.alert){
alertDiv().innerText=data.alert.text;
}

if(data.bonus && data.bonus[user]){
me().balance+=data.bonus[user];
await fetch(API+"bonus/"+user+".json",{method:"DELETE"});
}
}catch(e){}
}

// ALERT
function alertDiv(){return document.getElementById("alert");}

// SAVE
function save(){localStorage.setItem("NUX_DB",JSON.stringify(db));}

// RENDER
function renderAll(){
renderProfile();
renderHome();
renderShop();
renderBank();
renderPets();
renderBots();
}

</script>
</body>
</html>
