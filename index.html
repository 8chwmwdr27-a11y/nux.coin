<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NUX Work Terminal</title>
<style>
:root { --gold: #ffd700; --dark: #121212; --card: #1e1e1e; --text: #e0e0e0; }
body { background-color: var(--dark); color: var(--text); font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
.container { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--gold); box-shadow: 0 15px 35px rgba(0,0,0,0.7); width: 350px; text-align: center; }
input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; text-align: center; }
button { width: 100%; padding: 12px; margin-top: 10px; background: var(--gold); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: #000; }
.hidden { display: none !important; }
.balance { font-size: 40px; font-weight: bold; color: var(--gold); margin: 15px 0; }
.task-list { background: #111; padding: 15px; border-radius: 10px; text-align: right; margin-top: 20px; border: 1px dashed var(--gold); }
.task-item { border-bottom: 1px solid #333; padding: 8px 0; font-size: 14px; display: flex; align-items: center; }
.task-item::before { content: "●"; color: var(--gold); margin-left: 8px; }
.logout-link { color: #ff4444; font-size: 12px; cursor: pointer; margin-top: 20px; display: block; }
</style>
</head>
<body>

<div id="auth-screen" class="container">
<h2>כניסה לעובד NUX</h2>
<input type="text" id="username" placeholder="שם משתמש">
<input type="password" id="password" placeholder="סיסמה">
<button onclick="auth()">התחבר / הרשם</button>
</div>

<div id="main-screen" class="container hidden">
<div style="color: var(--gold); font-weight: bold;" id="user-tag"></div>
<div class="balance" id="balance">0</div>

<div id="job-select">
<h4>בחר עבודה להתחלת שכר:</h4>
<button onclick="startJob('סוכן', 120)" style="background: #333; color: white; margin-bottom: 5px;">סוכן (120/דק')</button>
<button onclick="startJob('מוציא לפועל', 100)" style="background: #333; color: white;">מוציא לפועל (100/דק')</button>
</div>

<div id="active-work" class="hidden">
<div style="color: #00ff41;">בתפקיד: <span id="job-title"></span></div>
<div class="task-list">
<strong style="font-size: 12px; color: #888;">משימות מהמנהל:</strong>
<div id="tasks-container">מחכה למשימות...</div>
</div>
<button onclick="resign()" style="background: #ff4444; color: white; margin-top: 15px;">התפטרות</button>
</div>

<span class="logout-link" onclick="location.reload()">התנתק</span>
</div>

<script>
let user = null;
let db = JSON.parse(localStorage.getItem('nux_db')) || {};

function auth() {
const u = document.getElementById('username').value;
const p = document.getElementById('password').value;
if(!u || !p) return;
if(!db[u]) db[u] = { pass: p, balance: 0, job: null };
if(db[u].pass !== p) return alert("טעות");
user = u;
showMain();
}

function showMain() {
document.getElementById('auth-screen').classList.add('hidden');
document.getElementById('main-screen').classList.remove('hidden');
document.getElementById('user-tag').innerText = `עובד: ${user}`;
updateUI();
setInterval(syncTasks, 3000); // בדיקת משימות חדשות כל 3 שניות
}

function startJob(name, pay) {
db[user].job = { name, pay };
save();
updateUI();
}

function updateUI() {
const data = db[user];
document.getElementById('balance').innerText = Math.floor(data.balance).toLocaleString();
if(data.job) {
document.getElementById('job-select').classList.add('hidden');
document.getElementById('active-work').classList.remove('hidden');
document.getElementById('job-title').innerText = data.job.name;
} else {
document.getElementById('job-select').classList.remove('hidden');
document.getElementById('active-work').classList.add('hidden');
}
}

setInterval(() => {
if(user && db[user].job) {
db[user].balance += (db[user].job.pay / 60);
save();
document.getElementById('balance').innerText = Math.floor(db[user].balance).toLocaleString();
}
}, 1000);

function save() { localStorage.setItem('nux_db', JSON.stringify(db)); }
function resign() { db[user].job = null; save(); updateUI(); }

// פונקציית סינכרון משימות "באוויר" (מדמה שרת)
async function syncTasks() {
try {
const res = await fetch('https://firebaseio.com');
const data = await res.json();
if(data) {
let html = '';
for(let id in data) { html += `<div class="task-item">${data[id].text}</div>`; }
document.getElementById('tasks-container').innerHTML = html;
}
} catch(e) {}
}
</script>
</body>
</html>
