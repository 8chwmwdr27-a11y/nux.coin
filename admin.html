<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>NUX ADMIN CONTROL</title>

<style>
body { background:#0a0a0a; color:#fff; font-family:Arial; text-align:center; }
.container { background:#161616; padding:20px; border-radius:15px; width:400px; margin:20px auto; }
input, select, button {
  padding:10px; margin:5px; border-radius:10px; border:none;
}
button { background:gold; cursor:pointer; }
.item { border:1px solid #333; margin:10px; padding:10px; border-radius:10px; }
</style>

</head>
<body>

<div class="container">
<h2>🧠 מערכת שליטה</h2>

<h3>📢 הודעה לכולם</h3>
<input id="alertText" placeholder="הודעה">
<button onclick="sendAlert()">שלח</button>

<h3>💰 בונוס</h3>
<input id="bonusUser" placeholder="שם משתמש">
<input id="bonusAmount" placeholder="סכום">
<button onclick="sendBonus()">שלח</button>
</div>

<div class="container">
<h3>🛒 יצירת פריט לחנות</h3>

<input id="itemName" placeholder="שם פריט">
<input id="itemPrice" placeholder="מחיר">

<select id="itemType">
<option value="salary">שדרוג שכר</option>
<option value="speed">שדרוג מהירות</option>
<option value="bot">בוט</option>
<option value="pet">חיה</option>
<option value="cosmetic">קוסמטי</option>
</select>

<input id="itemValue" placeholder="ערך (למשל 1.5 או 10)">

<button onclick="createItem()">צור פריט</button>
</div>

<div class="container">
<h3>📦 פריטים קיימים</h3>
<div id="items"></div>
</div>

<script>

const API = "https://nuxcoin-e0d41-default-rtdb.firebaseio.com/";

// ===== ALERT =====
async function sendAlert(){
let text=alertText.value;
await fetch(API+"alert.json",{method:"PUT",body:JSON.stringify({text})});
alert("נשלח");
}

// ===== BONUS =====
async function sendBonus(){
let u=bonusUser.value;
let a=parseInt(bonusAmount.value);
await fetch(API+"bonus/"+u+".json",{method:"PUT",body:JSON.stringify(a)});
alert("בונוס נשלח");
}

// ===== CREATE ITEM =====
async function createItem(){
let name=itemName.value;
let price=parseInt(itemPrice.value);
let type=itemType.value;
let value=parseFloat(itemValue.value);

let item={
name, price, type, value
};

await fetch(API+"shopItems.json",{
method:"POST",
body:JSON.stringify(item)
});

loadItems();
}

// ===== LOAD ITEMS =====
async function loadItems(){
let res=await fetch(API+"shopItems.json");
let data=await res.json();

items.innerHTML="";

for(let id in data){
let i=data[id];

items.innerHTML+=`
<div class="item">
${i.name} | ${i.price} NUX<br>
סוג: ${i.type} | ערך: ${i.value}<br>
<button onclick="deleteItem('${id}')">מחק</button>
</div>
`;
}
}

// ===== DELETE =====
async function deleteItem(id){
await fetch(API+"shopItems/"+id+".json",{method:"DELETE"});
loadItems();
}

// INIT
loadItems();

</script>

</body>
</html>
