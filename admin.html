<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>NUX ADMIN PANEL</title>

<style>
body { background:#0a0a0a; color:#fff; font-family:Arial; text-align:center; }

.container {
  background:#161616;
  padding:20px;
  border-radius:15px;
  width:400px;
  margin:20px auto;
}

input, select, button {
  padding:10px;
  margin:5px;
  border-radius:10px;
  border:none;
}

button {
  background:gold;
  cursor:pointer;
}

.item {
  border:1px solid #333;
  padding:10px;
  margin:10px;
  border-radius:10px;
}
</style>

</head>
<body>

<div class="container">
<h2>🔐 מערכת שליטה NUX</h2>

<h3>📢 הודעה לכל המשתמשים</h3>
<input id="alertText" placeholder="כתוב הודעה">
<button onclick="sendAlert()">שלח</button>

<h3>💰 בונוס למשתמש</h3>
<input id="bonusUser" placeholder="שם משתמש">
<input id="bonusAmount" placeholder="סכום">
<button onclick="sendBonus()">שלח בונוס</button>
</div>

<div class="container">
<h3>🛒 יצירת פריט לחנות</h3>

<input id="itemName" placeholder="שם פריט">
<input id="itemPrice" placeholder="מחיר">

<select id="itemType">
<option value="money">💰 כסף</option>
<option value="boost">⚡ בוסט</option>
<option value="cosmetic">🎨 קוסמטי</option>
<option value="bot">🤖 בוט</option>
<option value="pet">🐾 חיה</option>
</select>

<input id="itemValue" placeholder="ערך">

<button onclick="createItem()">צור פריט</button>
</div>

<div class="container">
<h3>📦 ניהול פריטים</h3>
<div id="items"></div>
</div>

<script>

// 🔥 FIREBASE שלך
const API = "https://nuxcoin-e0d41-default-rtdb.firebaseio.com/";

// ===== ALERT =====
async function sendAlert(){
let text = document.getElementById("alertText").value;

await fetch(API + "alert.json", {
method:"PUT",
body: JSON.stringify({text})
});

alert("הודעה נשלחה");
}

// ===== BONUS =====
async function sendBonus(){
let user = document.getElementById("bonusUser").value;
let amount = parseInt(document.getElementById("bonusAmount").value);

await fetch(API + "bonus/" + user + ".json", {
method:"PUT",
body: JSON.stringify(amount)
});

alert("בונוס נשלח");
}

// ===== CREATE ITEM =====
async function createItem(){

let name = document.getElementById("itemName").value;
let price = parseInt(document.getElementById("itemPrice").value);
let type = document.getElementById("itemType").value;
let value = parseFloat(document.getElementById("itemValue").value);

let item = { name, price, type, value };

await fetch(API + "shopItems.json", {
method:"POST",
body: JSON.stringify(item)
});

loadItems();
}

// ===== LOAD ITEMS =====
async function loadItems(){

let res = await fetch(API + "shopItems.json");
let data = await res.json();

let container = document.getElementById("items");
container.innerHTML = "";

for(let id in data){

let i = data[id];

container.innerHTML += `
<div class="item">
<strong>${i.name}</strong><br>
מחיר: ${i.price}<br>
סוג: ${i.type}<br>
ערך: ${i.value}<br>

<button onclick="deleteItem('${id}')">❌ מחק</button>
</div>
`;
}
}

// ===== DELETE =====
async function deleteItem(id){

await fetch(API + "shopItems/" + id + ".json", {
method:"DELETE"
});

loadItems();
}

// ===== INIT =====
loadItems();

</script>
</body>
</html>
